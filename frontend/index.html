<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FonzControl — Iniciar Sesión</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <script>window.API_URL = window.location.protocol+'//'+window.location.hostname+':3000';</script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <h1>FonzControl</h1>
    <p class="subtitle">Sistema de Control de Gastos v3</p>

    <div id="alert" class="alert alert-danger hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" class="form-control" placeholder="usuario@fonz.mx" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" id="btn-login" class="btn btn-primary w-full" style="margin-top:8px;">
        Iniciar sesión
      </button>
    </form>

    <p style="text-align:center;margin-top:16px;font-size:12px;">
      <a href="pages/forgot-password.html">¿Olvidaste tu contraseña?</a>
    </p>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script>
  // Redirigir si ya hay sesión
  if (API.isLoggedIn()) redirectByRole(API.user()?.role);

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const alertEl = document.getElementById('alert');
    alertEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    try {
      const data = await API.auth.login(
        document.getElementById('email').value.trim(),
        document.getElementById('password').value
      );
      API.saveSession(data);
      redirectByRole(data.user.role);
    } catch (err) {
      alertEl.textContent = err.error || 'Credenciales inválidas';
      alertEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
    }
  });

  function redirectByRole(role) {
    const map = {
      operative:      'pages/operative-dashboard.html',
      validator:      'pages/validator-dashboard.html',
      administrativo: 'pages/admin-dashboard.html',
      buyer:          'pages/buyer-dashboard.html',
      superadmin:     'pages/superadmin-dashboard.html',
    };
    location.href = map[role] || 'pages/operative-dashboard.html';
  }
</script>
</body>
</html>
