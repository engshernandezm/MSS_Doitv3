<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña — FonzControl</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <script src="../assets/js/env.js"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <h1>FonzControl</h1>
    <p class="subtitle">Recuperar contraseña</p>

    <div id="alert" class="hidden"></div>

    <form id="form">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" class="form-control" placeholder="usuario@fonz.mx" required autofocus>
      </div>
      <button type="submit" id="btn" class="btn btn-primary w-full">Enviar enlace</button>
    </form>

    <p style="text-align:center;margin-top:16px;font-size:12px;">
      <a href="../index.html">← Volver al login</a>
    </p>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const alertEl = document.getElementById('alert');
  btn.disabled = true; btn.textContent = 'Enviando...';
  alertEl.className = 'hidden';

  try {
    await API.auth.forgotPassword(document.getElementById('email').value.trim());
    alertEl.className = 'alert alert-success';
    alertEl.textContent = 'Si el correo existe, recibirás un enlace en breve.';
  } catch {
    alertEl.className = 'alert alert-danger';
    alertEl.textContent = 'Error al procesar la solicitud.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enviar enlace';
  }
});
</script>
</body>
</html>
